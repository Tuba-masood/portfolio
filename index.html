<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Data Science Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #1E1E2E;
      --surface: #313244;
      --text:    #CDD6F4;
      --muted:   #9399B2;
      --accent:  #CBA6F7;
      --font-head: 'JetBrains Mono', monospace;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .hero { max-width: 640px; }

    .badge {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.8rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-family: var(--font-head);
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .hero .title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .hero .bio {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .links { display: flex; gap: 1rem; flex-wrap: wrap; }

    .links a {
      font-family: var(--font-head);
      font-size: 0.9rem;
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0.6rem 1.1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">

      <span class="badge">// open to internships</span>

      <h1>TUBA MASOOD</h1>

      <p class="title">Aspiring Data Scientist</p>

      <p class="bio">
        MS Data Science candidate &middot; Python, SQL &amp; machine learning.
        
      </p>

      <div class="links">
        <a href="https://github.com/Tuba-masood">GitHub</a>
        <a href="mailto:tubamasood99@gmail.com">Email</a>
      </div>

    </section>
  </main>
</body>
</html>
